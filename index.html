<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to ASM</title>
  <style>
    :root {
      --cag-red: #d82257;
      --cag-orange: #f37021;
      --cag-yellow: #ffc60b;
      --cag-gray: #f7f7f7;
      --text-dark: #2b2b2b;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-image: url('asset/asm.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: start;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 25px 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      color: white;
      background: linear-gradient(90deg, var(--cag-red), var(--cag-orange), var(--cag-yellow));
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), -1px -1px 2px rgba(0, 0, 0, 0.5);
    }

    h1 {
      color: var(--cag-red);
      margin: 30px 0 20px 0;
      text-align: center;
      font-size: 22px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6), -1px -1px 2px rgba(0, 0, 0, 0.4);
    }

    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 80%;
      max-width: 320px;
      margin: 12px 0;
      padding: 16px 24px;
      background-color: var(--cag-orange);
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5), 0 2px 4px rgba(0, 0, 0, 0.3);
      transition: 0.25s ease;
      text-align: center;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
    }

    .btn:hover {
      background-color: var(--cag-yellow);
      color: var(--text-dark);
      transform: scale(1.03);
    }

    .subsection {
      width: 80%;
      max-width: 340px;
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .subsection h2 {
      margin: 5px 0 15px 0;
      font-size: 17px;
      color: var(--cag-red);
    }

    .sub-btn-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sub-btn {
      flex: 1;
      min-width: 130px;
      padding: 12px 0;
      background-color: var(--cag-red);
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      transition: 0.2s ease;
      text-align: center;
    }

    .sub-btn:hover {
      background-color: var(--cag-yellow);
      color: var(--text-dark);
      transform: scale(1.05);
    }

    footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--text-dark);
      text-align: center;
    }
  </style>
</head>
<body>
